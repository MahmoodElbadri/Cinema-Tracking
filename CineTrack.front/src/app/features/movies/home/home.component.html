<div class="container">
    <div class="row">
        <div class="col-12">
            <h1>Trending Movies</h1>
        </div>
    </div>
    <div class="row col-12">
        @for (movie of movies(); track movie.id) {
        <div class="col-4">
            <app-movie-card
             (clikedMovieToAddToWatchlistToBseSentTEmitted)="addToWatchlist($event, movie.title)" 
             [movie]="movie" />
        </div>
        }
        @empty {
            <div class="alert alert-info">
                No movies found
            </div>
        }
    </div>
</div>
